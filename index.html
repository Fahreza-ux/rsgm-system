<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RSGM Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="bg-blue-50 flex items-center justify-center h-screen">

    <div id="loginCard" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-blue-600">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-tooth text-blue-600 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Sistem Informasi RSGM</h1>
            <p class="text-gray-500 text-sm">Silakan masuk ke akun Anda</p>
        </div>

        <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm flex items-center">
            <i class="fa-solid fa-circle-exclamation mr-2"></i>
            <span>Email atau Password salah!</span>
        </div>

        <form id="loginForm">
            <div class="mb-5">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Email/Username</label>
                <input type="text" id="username" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition" placeholder="admin@rsgm.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Kata Sandi</label>
                <input type="password" id="password" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg">
                Masuk ke Sistem
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Belum punya akun? <a href="#" class="text-blue-600 font-bold hover:underline">Daftar Staf Baru</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMessage');
            const loginCard = document.getElementById('loginCard');

            // Logika simulasi: Username 'admin' dan Password '12345'
            if (user === 'admin' && pass === '12345') {
                errorBox.classList.add('hidden');
                alert('Login Berhasil! Selamat datang.');
                window.location.href = 'dashboard.html'; 
            } else {
                // Tampilkan pesan error
                errorBox.classList.remove('hidden');
                
                // Tambahkan efek getar (shake) jika salah
                loginCard.classList.add('shake');
                setTimeout(() => {
                    loginCard.classList.remove('shake');
                }, 500);

                // Bersihkan form password
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
