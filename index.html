<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem RSGM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shake { animation: shake 0.3s ease-in-out 0s 2; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div id="loginCard" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Sistem Informasi RSGM</h1>
            <p class="text-sm text-gray-500">Silakan masuk untuk mengakses dashboard</p>
        </div>

        <div id="errorBox" class="hidden mb-4 p-3 bg-red-600 text-white text-sm rounded-lg text-center">
            ❌ Username atau Password salah!
        </div>

        <form id="mainLoginForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text" id="userInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Masukkan username" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="passInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition-all">
                MASUK
            </button>
        </form>

        <div class="mt-6 text-center border-t pt-4">
            <p class="text-sm text-gray-600">Belum punya akun staf? 
                <a href="register.html" class="text-blue-600 font-bold hover:underline">Daftar Sekarang</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('mainLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const errorBox = document.getElementById('errorBox');
            const loginCard = document.getElementById('loginCard');

            // Logika tetap sama (admin/12345) tapi keterangannya sudah tidak ada di layar
            if (user === 'admin' && pass === '12345') {
                window.location.href = 'dashboard.html';
            } else {
                errorBox.classList.remove('hidden');
                loginCard.classList.add('shake');
                setTimeout(() => { loginCard.classList.remove('shake'); }, 300);
            }
        });
    </script>
</body>
</html>
