<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login RSGM - Sistem Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
        @keyframes shake {
            0% { margin-left: 0rem; }
            25% { margin-left: 0.5rem; }
            75% { margin-left: -0.5rem; }
            100% { margin-left: 0rem; }
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">

    <div id="loginCard" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Login Admin RSGM</h1>
            <p class="text-sm text-gray-500">Gunakan <b>admin</b> & password <b>12345</b></p>
        </div>

        <div id="errorBox" class="hidden mb-4 p-3 bg-red-500 text-white text-sm rounded-lg text-center font-bold">
            ❌ Password Salah atau User Tidak Ditemukan!
        </div>

        <form id="mainLoginForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm mb-2">Username</label>
                <input type="text" id="userInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm mb-2">Password</label>
                <input type="password" id="passInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all">
                MASUK KE SISTEM
            </button>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('mainLoginForm');
        const errorBox = document.getElementById('errorBox');
        const loginCard = document.getElementById('loginCard');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload halaman
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            // Validasi Sederhana
            if (user === 'admin' && pass === '12345') {
                errorBox.classList.add('hidden');
                alert('Login Berhasil! Mengalihkan ke Dashboard...');
                
                // Mengalihkan ke halaman dashboard.html
                window.location.href = 'dashboard.html';
            } else {
                // Efek jika salah
                errorBox.classList.remove('hidden');
                loginCard.classList.add('shake');
                
                // Reset efek shake agar bisa dipakai lagi
                setTimeout(() => { loginCard.classList.remove('shake'); }, 500);
                document.getElementById('passInput').value = '';
            }
        });
    </script>
</body>
</html>
